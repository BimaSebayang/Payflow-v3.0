version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: payflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    restart: unless-stopped
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"

  paymentgateway:
    build:
      context: ./paymentgateway
    container_name: paymentgateway
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "8080:8080"

  paymentmain:
    build:
      context: ./paymentmain
    container_name: paymentmain
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "8081:8081"

  paymenthistory:
    build:
      context: ./paymenthistory
    container_name: paymenthistory
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "8082:8082"

  paymentscheduler:
    build:
      context: ./paymentscheduler
    container_name: paymentscheduler
    depends_on:
      - postgres
      - redis
    ports:
      - "8083:8083"